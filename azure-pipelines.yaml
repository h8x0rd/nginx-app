trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
- stage: Deploy
  displayName: Deploy nginx to OpenShift
  jobs:
  - deployment: DeployNginx
    displayName: Deploy to OpenShift
    environment:
      name: ocp-dev
      resourceName: webapp1
      resourceType: Kubernetes
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - script: |
              echo "Checking manifest..."
              ls -l
              test -f nginx-app.yaml
            displayName: Validate manifest exists

          - task: KubernetesManifest@1
            displayName: Deploy manifest
            inputs:
              action: deploy
              namespace: webapp1
              manifests: |
                nginx-app.yaml
