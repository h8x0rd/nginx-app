trigger:
- main

parameters:
- name: deployMode
  displayName: Deployment mode
  type: string
  default: local
  values:
  - local
  - azure

variables:
  namespace: webapp1
  manifestFile: nginx-app.yaml
  deploymentName: webapp1
  routeName: webapp1

stages:
- stage: Deploy
  displayName: Deploy nginx app
  jobs:

  - job: DeployLocal
    displayName: Deploy locally from OpenShift agent
    condition: eq('${{ parameters.deployMode }}', 'local')
    pool:
      name: gm-agents   # change if your self-hosted pool has a different name

    steps:
    - checkout: self

    - script: |
        set -e
        export HOME="$(Agent.TempDirectory)"
        export KUBECONFIG="$HOME/.kube/config"
        mkdir -p "$HOME/.kube"

        echo "Running on self-hosted OpenShift agent"
        echo "Hostname: $(hostname)"
        echo "ServiceAccount namespace:"
        cat /var/run/secrets/kubernetes.io/serviceaccount/namespace
        echo
        echo "HOME=$HOME"
        echo "KUBECONFIG=$KUBECONFIG"
        echo
        oc version --client
        kubectl version --client
      displayName: Prove local on-cluster execution

    - script: |
        set -e
        export HOME="$(Agent.TempDirectory)"
        export KUBECONFIG="$HOME/.kube/config"
        mkdir -p "$HOME/.kube"

        echo "Testing cluster access"
        oc whoami || true
        oc get pods -n $(namespace)
      displayName: Test cluster access

    - script: |
        set -e
        export HOME="$(Agent.TempDirectory)"
        export KUBECONFIG="$HOME/.kube/config"
        mkdir -p "$HOME/.kube"

        echo "Validating manifest"
        test -f $(manifestFile)
        echo "Deploying manifest"
        oc apply -n $(namespace) -f $(manifestFile)
      displayName: Deploy nginx app

    - script: |
        set -e
        export HOME="$(Agent.TempDirectory)"
        export KUBECONFIG="$HOME/.kube/config"
        mkdir -p "$HOME/.kube"

        echo "Waiting for rollout"
        oc rollout status deployment/$(deploymentName) -n $(namespace) --timeout=180s

        echo
        echo "Resources in namespace $(namespace):"
        oc get all -n $(namespace)

        echo
        echo "Route details:"
        oc get route $(routeName) -n $(namespace) -o wide

        echo
        echo "Application URL:"
        oc get route $(routeName) -n $(namespace) -o jsonpath='{.spec.host}{"\n"}'
      displayName: Verify rollout

  - deployment: DeployAzure
    displayName: Deploy via Azure environment
    condition: eq('${{ parameters.deployMode }}', 'azure')
    pool:
      vmImage: ubuntu-latest
    environment:
      name: ocp-dev
      resourceName: webapp1
      resourceType: Kubernetes
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - script: |
              set -e
              echo "Validating manifest"
              test -f $(manifestFile)
            displayName: Validate manifest exists

          - task: KubernetesManifest@1
            displayName: Deploy manifest
            inputs:
              action: deploy
              namespace: $(namespace)
              manifests: |
                $(manifestFile)
