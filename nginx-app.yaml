---
apiVersion: v1
kind: Namespace
metadata:
  name: webapp1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp1-content
  namespace: webapp1
data:
  index.html: |
    <html><body><h1>Hello from webapp1</h1></body></html>
  healthz: |
    ok
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp1
  namespace: webapp1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp1
  template:
    metadata:
      labels:
        app: webapp1
    spec:
      containers:
      - name: nginx
        image: quay.io/nginx/nginx-unprivileged
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: web-content
          mountPath: /usr/share/nginx/html
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: web-content
        configMap:
          name: webapp1-content
---
apiVersion: v1
kind: Service
metadata:
  name: webapp1
  namespace: webapp1
spec:
  selector:
    app: webapp1
  ports:
  - name: web
    port: 80
    targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: webapp1
  namespace: webapp1
spec:
  to:
    kind: Service
    name: webapp1
  port:
    targetPort: web
